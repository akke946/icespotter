<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE Spotter App</title>
    <style>
        :root {
            --db-red: #ea1c24;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --border-color: #333;
            --input-bg: #1e1e1e;
            --accent-color: var(--db-red);
        }

        [data-theme="light"] {
            --bg-dark: #f5f5f5;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-muted: #666;
            --border-color: #cccccc;
            --input-bg: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }
        header, .section-box {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent-color);
            position: relative;
        }
        h1, h2, h3 { margin: 0; font-size: 1.4rem; color: var(--text-main); }
        h2 { font-size: 1.2rem; }
        h3 { font-size: 1rem; margin-top: 10px; margin-bottom: 5px; }
        .stats { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        
        .settings-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-muted);
            outline: none;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: center;
            margin-top: 10px;
        }
        .countdown-item {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }
        .countdown-number { font-size: 1.6rem; font-weight: bold; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; }
        input, select { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 5px; font-size: 1rem; }
        input { flex-grow: 1; }
        
        .btn { background: var(--accent-color); color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-secondary { background: #4caf50; }
        .btn-danger { background: #db4437; }
        .btn-small { padding: 6px 12px; font-size: 0.85rem; margin-right: 5px; margin-bottom: 5px; }
        
        .suggestions { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 5px; max-height: 150px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .suggestion-item:hover { background: var(--input-bg); }

        details { background: var(--card-bg); margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        summary { padding: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; background: var(--input-bg); }
        .accordion-content { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        .train-card { background: var(--input-bg); padding: 12px; border-radius: 6px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); }
        .train-card.spotted { border-color: #2e7d32; }
        .train-info { flex-grow: 1; }
        .train-name { font-weight: bold; font-size: 1.1rem; }
        .train-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }
        
        .delete-btn { background: #db4437; border: none; color: #fff; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; display: flex; justify-content: space-between; }
        
        .settings-box { display: none; }
        .setting-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .setting-row-inline { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .msg-box { padding: 10px; border-radius: 5px; margin-bottom: 10px; display: none; font-weight: bold; text-align: center; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>ICE-Taufnamen Sammler</h1>
        <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        <div class="stats" id="stats-counter">Bereit</div>
        <div class="countdown-grid">
            <div class="countdown-item">
                <div class="countdown-number" id="count-spotted" style="color: #4caf50;">0</div>
                <div style="color: #4caf50;">Gesehen</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="count-missing" style="color: #ff9800;">0</div>
                <div style="color: #ff9800;">Noch offen</div>
            </div>
        </div>
    </header>

    <div id="settings-area" class="section-box settings-box">
        <h2>Optionen & Daten</h2>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 10px 0;">
        
        <div class="setting-row-inline">
            <label for="theme-select">Farbschema:</label>
            <select id="theme-select" onchange="changeTheme(this.value)">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
        </div>

        <div class="setting-row-inline">
            <label for="color-select">Akzentfarbe:</label>
            <select id="color-select" onchange="changeAccentColor(this.value)">
                <option value="#ea1c24">DB Rot</option>
                <option value="#222d5a">Bahnhofsblau</option>
                <option value="#587f40">S-Bahn-Grün</option>
                <option value="#903373">Ersatzverkehrlila</option>
            </select>
        </div>

        <div class="setting-row-inline">
            <label for="toggle-tz">Tz-Nummer anzeigen:</label>
            <input type="checkbox" id="toggle-tz" checked onchange="toggleTzDisplay(this.checked)" style="flex-grow:0;">
        </div>

        <div class="setting-row-inline">
            <label for="toggle-history">Sichtungsverlauf anzeigen:</label>
            <input type="checkbox" id="toggle-history" checked onchange="toggleHistoryDisplay(this.checked)" style="flex-grow:0;">
        </div>

        <h3>Züge-Datenbank verwalten</h3>
        <div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;">
            <button class="btn btn-secondary" onclick="downloadDatabaseFromServer()">Datenbank online aktualisieren</button>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">Manuelle Textdatei importieren (Fallback):</p>
        <input type="file" id="tx-file-input" accept=".txt" onchange="loadTxtFile(this)" style="width:100%; box-sizing:border-box; margin-bottom:15px;">

        <h3>Sichtungsdaten verwalten</h3>
        <div style="margin-bottom: 15px;">
            <button class="btn btn-small btn-danger" onclick="clearSightingData()">Sichtungen zurücksetzen</button>
        </div>
        
        <button class="btn btn-secondary" onclick="toggleSettings()">Schließen</button>
    </div>

    <div class="controls">
        <div id="message" class="msg-box"></div>
        <div class="input-group">
            <input type="text" id="spot-input" placeholder="Zugname oder Tz-Nummer..." oninput="showSuggestions(this.value)">
            <button class="btn" onclick="submitSighting()">Sichten!</button>
        </div>
        <div id="suggestions-box" class="suggestions"></div>
    </div>
    
    <details id="details-missing" open>
        <summary>Noch offen (<span id="title-count-missing">0</span>)</summary>
        <div class="accordion-content" id="missing-container"></div>
    </details>

    <details id="details-spotted">
        <summary>Gesehen & Gesammelt (<span id="title-count-spotted">0</span>)</summary>
        <div class="accordion-content" id="spotted-container"></div>
    </details>

    <div class="section-box" id="history-section">
        <h2>Verlauf der Sichtungen</h2>
        <ul class="history-list" id="history-container">
            <li style="color: #888; font-style: italic;">Noch keine Züge gesichtet.</li>
        </ul>
    </div>

    <script>
        let trains = [];
        let spottedTrains = {};
        let doppelteNamen = new Set();
        let appConfig = {theme:"dark", accent:"#ea1c24", showTz:true, showHistory:true};

        try {
            const savedSpotted = localStorage.getItem('spottedICE_v5');
            if (savedSpotted) spottedTrains = JSON.parse(savedSpotted);
        } catch(e) { spottedTrains = {}; }

        try {
            const savedTrains = localStorage.getItem('trainsCache_v5');
            if (savedTrains) trains = JSON.parse(savedTrains);
        } catch(e) { trains = []; }

        try {
            const savedConfig = localStorage.getItem('iceAppConfig_v5');
            if (savedConfig) appConfig = JSON.parse(savedConfig);
        } catch(e) {}

        function parseAndSaveText(text) {
            let parsed = [];
            const lines = text.split('\n');
            
            lines.forEach(line => {
                const parts = line.split(';');
                if (parts.length >= 4) {
                    parsed.push({ 
                        id: parts[0].trim(), 
                        number: parts[1].trim(), 
                        name: parts[2].trim(), 
                        type: parts[3].trim()
                    });
                }
            });

            if (parsed.length > 0) {
                trains = parsed;
                try { localStorage.setItem('trainsCache_v5', JSON.stringify(trains)); } catch(err) {}
                return true;
            }
            return false;
        }

        function downloadDatabaseFromServer() {
            // ERSETZE DIESE URL MIT DEINER KOPIERTEN CORS-PROXY/PASTEBIN RAW URL
            const url = "https://gist.githubusercontent.com/akke946/cd5e2a6675157254b2cabbfae148ea2a/raw/92f57a9445b118362fcdd9f50d443cd371d5347c/gistfile1.txt";
            
            showStatusMessage("Lade Datenbank...", "#ff9800");

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Netzwerkfehler");
                    return response.text();
                })
                .then(text => {
                    if (parseAndSaveText(text)) {
                        showStatusMessage("Datenbank erfolgreich geladen!", "#4caf50");
                        initApp();
                    } else {
                        showStatusMessage("Falsches Textformat empfangen!", "#db4437");
                    }
                })
                .catch(err => {
                    showStatusMessage("Download fehlgeschlagen!", "#db4437");
                });
        }

        function loadTxtFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                if (parseAndSaveText(e.target.result)) {
                    showStatusMessage("Datenbank lokal geladen!", "#4caf50");
                    document.getElementById('settings-area').style.display = 'none';
                    initApp();
                } else {
                    showStatusMessage("Falsches Format!", "#db4437");
                }
            };
            reader.readAsText(file);
        }

        function checkFirstStart() {
            if (trains.length === 0) {
                downloadDatabaseFromServer();
            }
        }

        function ermittleDoppelteNamen() {
            doppelteNamen.clear();
            const namenGesehen = new Set();
            trains.forEach(t => {
                if (t && t.name) {
                    const nameKlein = t.name.toLowerCase();
                    if (namenGesehen.has(nameKlein)) {
                        doppelteNamen.add(nameKlein);
                    }
                    namenGesehen.add(nameKlein);
                }
            });
        }

        function toggleSettings() {
            const area = document.getElementById('settings-area');
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
        }

        function applyConfig() {
            document.documentElement.setAttribute('data-theme', appConfig.theme || 'dark');
            document.getElementById('theme-select').value = appConfig.theme || 'dark';
            document.documentElement.style.setProperty('--accent-color', appConfig.accent || '#ea1c24');
            document.getElementById('color-select').value = appConfig.accent || '#ea1c24';
            document.getElementById('toggle-tz').checked = appConfig.showTz !== false;
            document.getElementById('toggle-history').checked = appConfig.showHistory !== false;

            toggleHistoryDisplay(appConfig.showHistory !== false);
        }

        function saveConfig() {
            try { localStorage.setItem('iceAppConfig_v5', JSON.stringify(appConfig)); } catch(e) {}
        }

        function changeTheme(theme) {
            appConfig.theme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            saveConfig();
        }

        function changeAccentColor(color) {
            appConfig.accent = color;
            document.documentElement.style.setProperty('--accent-color', color);
            saveConfig();
        }

        function toggleTzDisplay(checked) {
            appConfig.showTz = checked;
            saveConfig();
            initApp();
        }

        function toggleHistoryDisplay(checked) {
            appConfig.showHistory = checked;
            saveConfig();
            const section = document.getElementById('history-section');
            if(section) {
                if(checked) section.classList.remove('hidden');
                else section.classList.add('hidden');
            }
        }

        function clearSightingData() {
            if(confirm("Alle Sichtungen löschen?")) {
                spottedTrains = {};
                try { localStorage.setItem('spottedICE_v5', JSON.stringify(spottedTrains)); } catch(e) {}
                initApp();
            }
        }

        function initApp() {
            ermittleDoppelteNamen();
            applyConfig();
            renderLists();
            renderStats();
        }

        function showSuggestions(val) {
            const box = document.getElementById('suggestions-box');
            if (trains.length === 0 || !val || val.length < 2) { box.style.display = 'none'; return; }
            
            const search = val.toLowerCase();
            const filtered = trains.filter(t => !spottedTrains[t.id] && (t.name.toLowerCase().includes(search) || t.number.toLowerCase().includes(search)));
            
            if (filtered.length === 0) { box.style.display = 'none'; return; }

            box.innerHTML = "";
            box.style.display = 'block';
            
            filtered.slice(0, 5).forEach(train => {
                const istDoppelt = doppelteNamen.has(train.name.toLowerCase());
                const anzeigeText = istDoppelt ? `${train.name} (${train.type})` : train.name;

                const div = document.createElement('div');
                div.className = "suggestion-item";
                div.innerText = anzeigeText;
                div.onclick = () => {
                    document.getElementById('spot-input').value = train.number;
                    box.style.display = 'none';
                };
                box.appendChild(div);
            });
        }

        function submitSighting() {
            if (trains.length === 0) return;
            const inputEl = document.getElementById('spot-input');
            const inputVal = inputEl.value.trim().toLowerCase();
            if (!inputVal) return;

            const foundTrain = trains.find(t => t.number.toLowerCase() === inputVal || t.name.toLowerCase() === inputVal);

            if (foundTrain) {
                if (spottedTrains[foundTrain.id]) {
                    showStatusMessage(`Schon gesammelt!`, "#ff9800");
                } else {
                    spottedTrains[foundTrain.id] = new Date().toLocaleString('de-DE');
                    try { localStorage.setItem('spottedICE_v5', JSON.stringify(spottedTrains)); } catch(e) {}
                    showStatusMessage(`Erfolg!`, "#4caf50");
                    inputEl.value = "";
                    document.getElementById('suggestions-box').style.display = 'none';
                    initApp();
                }
            } else {
                showStatusMessage("Nicht gefunden!", "#db4437");
            }
        }

        function showStatusMessage(text, bgColor) {
            const msgEl = document.getElementById('message');
            msgEl.innerText = text; msgEl.style.backgroundColor = bgColor; msgEl.style.display = 'block';
            setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
        }

        function removeSighting(id) {
            delete spottedTrains[id];
            try { localStorage.setItem('spottedICE_v5', JSON.stringify(spottedTrains)); } catch(e) {}
            initApp();
        }

        function renderStats() {
            if (trains.length === 0) return;
            let spottedCount = 0;
            trains.forEach(t => { if (spottedTrains[t.id]) spottedCount++; });
            let missingCount = trains.length - spottedCount;

            document.getElementById('stats-counter').innerText = `Gesamtfortschritt: ${Math.round((spottedCount/trains.length)*100) || 0}%`;
            document.getElementById('count-spotted').innerText = spottedCount;
            document.getElementById('count-missing').innerText = missingCount;
            document.getElementById('title-count-missing').innerText = missingCount;
            document.getElementById('title-count-spotted').innerText = spottedCount;

            const historyContainer = document.getElementById('history-container');
            historyContainer.innerHTML = "";

            let historyArray = trains
                .filter(t => spottedTrains[t.id])
                .map(t => ({ ...t, spottedAt: spottedTrains[t.id] }));

            if (historyArray.length === 0) {
                historyContainer.innerHTML = `<li style="color: #888; font-style: italic;">Noch keine Züge gesichtet.</li>`;
                return;
            }

            historyArray.reverse();
            historyArray.forEach(train => {
                const li = document.createElement('li');
                li.className = "history-item";
                const tzInHistory = appConfig.showTz ? ` (${train.number})` : '';
                li.innerHTML = `<span><strong>${train.name}</strong>${tzInHistory}</span><span style="color:var(--text-muted); font-size:0.85rem;">${train.spottedAt}</span>`;
                historyContainer.appendChild(li);
            });
        }

        function renderLists() {
            const missingContainer = document.getElementById('missing-container');
            const spottedContainer = document.getElementById('spotted-container');
            missingContainer.innerHTML = ""; spottedContainer.innerHTML = "";

            trains.forEach(train => {
                const isSpotted = !!spottedTrains[train.id];
                const card = document.createElement('div');
                card.className = `train-card ${isSpotted ? 'spotted' : ''}`;
                const tzText = appConfig.showTz ? ` • Tz-Nummer: ${train.number}` : '';
                
                if (isSpotted) {
                    card.innerHTML = `<div class="train-info"><div class="train-name">${train.name}</div><div class="train-meta">${train.type}${tzText}</div></div><button class="delete-btn" onclick="removeSighting('${train.id}')">X</button>`;
                    spottedContainer.appendChild(card);
                } else {
                    card.innerHTML = `<div class="train-info"><div class="train-name">${train.name}</div><div class="train-meta">${train.type}${tzText}</div></div>`;
                    missingContainer.appendChild(card);
                }
            });
        }

        initApp();
        checkFirstStart();
    </script>
</body>
</html>
